name: Renew YouTube WebSub subscriptions

on:
  schedule:
    # WebSub subscriptions expire. Renew daily at 03:15 KST (18:15 UTC).
    - cron: "15 18 * * *"
  workflow_dispatch:

concurrency:
  group: renew-youtube-websub
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_WEBHOOK_CALLBACK_URL: ${{ secrets.YOUTUBE_WEBHOOK_CALLBACK_URL }}
        run: |
          for name in NEXT_PUBLIC_SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY YOUTUBE_WEBHOOK_CALLBACK_URL; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub Actions secret: ${name}"
              exit 1
            fi
          done

      - name: Renew subscriptions
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_WEBHOOK_CALLBACK_URL: ${{ secrets.YOUTUBE_WEBHOOK_CALLBACK_URL }}
        run: npm run subscribe:youtube-webhooks
