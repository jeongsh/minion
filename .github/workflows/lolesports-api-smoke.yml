name: LoL Esports API smoke test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify LoL Esports API
        shell: bash
        run: |
          node <<'NODE'
          const now = new Date();
          const start = new Date(now.getTime() - 24 * 60 * 60 * 1000);
          const end = new Date(now.getTime() + 24 * 60 * 60 * 1000);

          const body = {
            operationName: "homeEvents",
            variables: {
              hl: "ko-KR",
              sport: ["lol"],
              leagues: [
                "98767991310872058",
                "98767991325878492",
                "98767975604431411",
                "113464388705111224"
              ],
              eventDateStart: start.toISOString(),
              eventDateEnd: end.toISOString(),
              eventState: ["unstarted", "inProgress", "completed"],
              eventType: "match",
              pageSize: 40
            },
            extensions: {
              persistedQuery: {
                version: 1,
                sha256Hash: "7246add6f577cf30b304e651bf9e25fc6a41fe49aeafb0754c16b5778060fc0a"
              }
            }
          };

          const response = await fetch("https://lolesports.com/api/gql", {
            method: "POST",
            headers: {
              "content-type": "application/json",
              "apollographql-client-name": "LCKHub GitHub Actions",
              "apollographql-client-version": "smoke-1"
            },
            body: JSON.stringify(body)
          });

          const payload = await response.json();
          if (!response.ok || payload.errors?.length) {
            console.error(JSON.stringify(payload, null, 2));
            process.exit(1);
          }

          const events = payload.data?.esports?.events ?? [];
          console.log(`LoL Esports API OK: ${events.length} event(s)`);
          for (const event of events.slice(0, 5)) {
            console.log(
              `${event.league?.slug ?? "unknown"} ` +
              `${event.match?.id ?? event.id} ` +
              `${event.match?.state ?? event.state}`
            );
          }
          NODE
